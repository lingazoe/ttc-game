<!DOCTYPE html>
<html>
   <head>
	  <link rel="stylesheet" href="css/style.css">
  </head>
  <body>
    <div class="title">ttc scramble </div>
    <div class="v-line1"></div>
    <div class="v-line2"></div>
    <div class="h-line3"></div>

    <div class="img-container">
      <img src="icons/rules.png"> 
      <img src="icons/credits.png"> 
      <img src="icons/logs.png">
    </div> 

    <div class="scrambled" id="display">scrambling...</div>

    <input type="text" class="guess" id="inputs" placeholder="eg. Cedarvale">

    <div class="container">
        <button class="buttons" id="end">end round</button>
        <button class="buttons" id="answer">show answer</button>
        <button class="buttons" id="next">next</button>
    </div>

    <div class="res-background"></div>

    <div class="res-container">
      <div class="res-box">
        <div class="res-title">round finished!</div>
        <div class="res-line"></div>
        <div class="res-text">
          <div id="scores">score: n/a</div>
          <div id="high-score">high score: n/a</div>
          <div id="score-rating">score rating: n/a</div>
        </div>
      </div>
    </div>

    <div class="credits">this website is in progress! <br> This project uses Open Data provided by the City of Toronto under the <a href="https://open.toronto.ca/open-data-licence/">Open Government Licence – Toronto</a></div>

    <div class="counter-container">
      <div id="score">score: 0</div>
      <div id="chances">chances: 3</div>
    </div>
    
    <script src="js/data.js"></script>
    <script src="js/logic.js"></script>
    <script src="js/script.js"></script>

  </body>
</html>
